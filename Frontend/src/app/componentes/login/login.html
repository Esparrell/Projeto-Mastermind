<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <div class="logo">
        🎯 Mastermind
      </div>
      <h1>Bem-vindo!</h1>
      <p>Entre com suas credenciais para continuar</p>
    </div>

    <form class="login-form" (ngSubmit)="login()">
      <div class="form-group">
        <label for="usuario">
          <span class="label-icon">👤</span>
          Usuário
        </label>
        <input
          id="usuario"
          type="text"
          placeholder="Digite seu usuário"
          required
          [(ngModel)]="usuario"
          name="usuario"
          autocomplete="username"
        />
      </div>

      <div class="form-group">
        <label for="senha">
          <span class="label-icon">🔒</span>
          Senha
        </label>
        <input
          id="senha"
          type="password"
          placeholder="Digite sua senha"
          required
          [(ngModel)]="senha"
          name="senha"
          autocomplete="current-password"
        />
      </div>

      <div class="form-options">
        <label class="checkbox-label">
          <input type="checkbox" [(ngModel)]="lembrar" name="lembrar">
          <span>Lembrar-me</span>
        </label>
        <a href="#" class="forgot-password">Esqueceu a senha?</a>
      </div>

      <button type="submit" class="btn-login" [disabled]="carregando">
        <span *ngIf="!carregando">Entrar</span>
        <span *ngIf="carregando" class="spinner-small"></span>
      </button>

      <div class="register-link">
        <p>Não tem uma conta? <a href="cadastro">Cadastre-se</a></p>
      </div>
    </form>

    <div class="login-footer">
      <p>© 2024 Mastermind - Todos os direitos reservados</p>
    </div>
  </div>
</div>
