<div class="cadastro-container">
  <div class="cadastro-card">
    <div class="cadastro-header">
      <div class="logo">
        🎯 Mastermind
      </div>
      <h1>Criar Conta</h1>
      <p>Preencha os dados abaixo para se cadastrar</p>
    </div>

    <form class="cadastro-form" (ngSubmit)="cadastrar()">
      <div class="form-group">
        <label for="usuario">
          <span class="label-icon">👤</span>
          Usuário *
        </label>
        <input
          id="usuario"
          type="text"
          placeholder="Digite seu usuário"
          required
          [(ngModel)]="usuario"
          name="usuario"
          autocomplete="username"
        />
        <small class="hint">Mínimo de 3 caracteres</small>
      </div>

      <div class="form-group">
        <label for="email">
          <span class="label-icon">📧</span>
          E-mail (opcional)
        </label>
        <input
          id="email"
          type="email"
          placeholder="seu@email.com"
          [(ngModel)]="email"
          name="email"
          autocomplete="email"
        />
      </div>

      <div class="form-group">
        <label for="senha">
          <span class="label-icon">🔒</span>
          Senha *
        </label>
        <input
          id="senha"
          type="password"
          placeholder="Digite sua senha"
          required
          [(ngModel)]="senha"
          name="senha"
          autocomplete="new-password"
        />
        <small class="hint">Mínimo de 4 caracteres</small>
      </div>

      <div class="form-group">
        <label for="confirmarSenha">
          <span class="label-icon">✓</span>
          Confirmar Senha *
        </label>
        <input
          id="confirmarSenha"
          type="password"
          placeholder="Confirme sua senha"
          required
          [(ngModel)]="confirmarSenha"
          name="confirmarSenha"
          autocomplete="new-password"
        />
      </div>

      <button type="submit" class="btn-cadastro" [disabled]="carregando">
        <span *ngIf="!carregando">Criar Conta</span>
        <span *ngIf="carregando" class="spinner-small"></span>
      </button>

      <div class="login-link">
        <p>Já tem uma conta? <a (click)="voltarParaLogin()">Faça login</a></p>
      </div>
    </form>

    <div *ngIf="erro" class="error-message">
      {{ erro }}
    </div>
    <div *ngIf="sucesso" class="success-message">
      {{ sucesso }}
    </div>

    <div class="cadastro-footer">
      <p>© 2024 Mastermind - Todos os direitos reservados</p>
    </div>
  </div>
</div>
