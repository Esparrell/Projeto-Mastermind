<div class="jogo-container">
    <div class="jogo-header">
    <button class="btn-back" (click)="voltar()">
      ← Voltar ao Dashboard
    </button>
    <h1>🎮 Mastermind</h1>
    <div class="info-container">
      <div class="pontuacao-info">
        <span class="info-badge">Tentativa {{jogo.linhaAtual + 1}} de 10</span>
      </div>
      <div class="timer-info">
        <span class="timer-icon">⏱️</span>
        <span class="timer-value">{{tempoAtual}}</span>
      </div>
    </div>
  </div>

  <div class="jogo-table-container">
    <table class="jogo-table">
      <thead>
        <tr>
          <th>Tentativa</th>
          <th colspan="4">Cores</th>
          <th>Ações</th>
          <th>Acertos</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let row of jogo.botoes; let i = index" 
            class="linha-jogo" 
            [class.linha-atual]="i === jogo.linhaAtual"
            [class.linha-finalizada]="jogo.acertos[i]">
          
          <td class="col-tentativa">
            <div class="tentativa-numero">
              <span class="numero">{{i + 1}}</span>
              <span class="pontos">({{10 - i}} pts)</span>
            </div>
          </td>
          
          <td class="col-cores" colspan="4">
            <div class="cores-container">
              <button *ngFor="let btn of row; let j = index"
                class="cor-btn"
                [ngClass]="getClasse(btn)"
                (click)="mudarCor(i, j)"
                [disabled]="i !== jogo.linhaAtual">
                <span class="btn-label">{{ btn.label }}</span>
              </button>
            </div>
          </td>
          
          <td class="col-acao">
            <button *ngIf="i === jogo.linhaAtual"
              class="btn-confirmar"
              (click)="enviarLinha(i)">
              ✓ Confirmar
            </button>
          </td>
          
          <td class="col-acertos">
            <div *ngIf="jogo.acertos[i]" class="acertos-container">
              <div class="acerto-item">
                <span class="acerto-label">✅ Acertos:</span>
                <span class="acerto-valor">{{jogo.acertos[i].acertos}}</span>
              </div>
            </div>
            <div *ngIf="!jogo.acertos[i]" class="acertos-placeholder">
              <span>—</span>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <div *ngIf="jogo.linhaAtual >= 10 && !jogo.acertos[9]" class="game-over-message">
    <div class="message-content">
      <h2>😔 Fim do Jogo!</h2>
      <p>Você não conseguiu adivinhar a sequência.</p>
      <p>Tempo total: {{tempoAtual}}</p>
      <button class="btn-jogar-novamente" (click)="reiniciarJogo()">Jogar Novamente</button>
    </div>
  </div>
</div>
